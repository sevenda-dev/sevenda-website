<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sevenda — Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Token allineati a checkout-success.html */
    :root {
      --bg:#0d0d0d; --surface:#111111;
      --accent:#E8733A; --accent-dim:rgba(232,115,58,.09); --accent-border:rgba(232,115,58,.28);
      --text:#f0f0f0; --text-2:#8a8a8a; --text-3:#4a4a4a;
      --font:'Geist',-apple-system,sans-serif; --mono:'Geist Mono','Courier New',monospace; --r-sm:8px;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:var(--font); background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px; text-align:center; -webkit-font-smoothing:antialiased;
    }
    .card { max-width:460px; }
    .icon {
      width:76px; height:76px; border-radius:50%; margin:0 auto 26px;
      display:flex; align-items:center; justify-content:center; font-size:34px;
      background:var(--accent-dim); border:1px solid var(--accent-border); color:var(--accent);
    }
    h1 { font-size:26px; font-weight:600; letter-spacing:-.03em; margin-bottom:10px; }
    p  { font-size:14.5px; color:var(--text-2); line-height:1.6; }
    .btn {
      display:inline-block; margin-top:28px; padding:12px 26px; border-radius:var(--r-sm);
      background:var(--accent); color:#0c0c0c; font-size:14px; font-weight:600;
      border:none; cursor:pointer; font-family:var(--font); transition:opacity .15s;
    }
    .btn:hover { opacity:.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <!-- Variante italiana:
         h1: "Tutto fatto."
         p:  "Le modifiche al tuo abbonamento sono state salvate. Puoi chiudere questa scheda e tornare a Sevenda." -->
    <h1>You're all set.</h1>
    <p>Your subscription changes have been saved. You can close this tab and return to Sevenda.</p>
    <button class="btn" onclick="window.close()">Close tab</button>
  </div>
</body>
</html>
